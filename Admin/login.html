<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KAG Admin | Secure Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top right, #1a1a2e, #0a0a12); 
            min-height: 100vh; 
        }
        .login-card { border: none; border-radius: 1.5rem; box-shadow: 0 1rem 3rem rgba(0,0,0,0.5); }
        .btn-primary { background: #d4af37; border: none; font-weight: 600; padding: 12px; color: #0a192f; }
        .btn-primary:hover { background: #f1c40f; color: #0a192f; }
        .form-control { border-radius: 0.75rem; padding: 0.75rem 1rem; }
    </style>
</head>
<body class="d-flex align-items-center py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                <div class="card login-card p-4 bg-white text-dark">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold" style="color: #0a192f;">KAG Maridadi</h3>
                        <p class="text-muted small">Authorized Personnel Only</p>
                    </div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <input type="text" id="user" class="form-control" placeholder="Username" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" id="pass" class="form-control" placeholder="Password" required>
                        </div>
                        <button type="submit" id="loginBtn" class="btn btn-primary w-100 py-2">Unlock Dashboard</button>
                        <div class="mt-4 text-center">
                            <a href="#" onclick="forgotPassword()" class="small text-decoration-none text-secondary">Forgot Password?</a>
                            <div class="my-3 border-top"></div>
                            <p class="small mb-0">Don't have an account? <a href="register.html" class="text-decoration-none fw-bold">Sign Up</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if the user just logged out
        if (new URLSearchParams(window.location.search).get('logout') === 'success') {
            if (!confirm("Administrator has logged out successfully. Would you like to log in again?")) {
                window.location.href = '../Frontend/index.html';
            }
        }

        function forgotPassword() {
            alert("For security reasons, hardcoded admin credentials must be recovered via the source code or by contacting the system developer.");
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verifying...';

            try {
                // Call the Backend Login API
                const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                    ? 'http://localhost:3000' : '';

                const res = await fetch(`${baseUrl}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    // Standardize token naming
                    localStorage.setItem('kag_token', data.token);
                    localStorage.setItem('kag_role', 'Admin');
                    window.location.href = 'dashboard.html';
                } else {
                    const error = await res.json();
                    alert("Access Denied: " + (error.message || "Incorrect credentials."));
                }
            } catch (err) {
                console.error("Connection error:", err);
                alert("Could not reach the backend. Is it running on port 3000?");
            } finally {
                btn.disabled = false;
                btn.innerText = 'Unlock Dashboard';
            }
        };
    </script>
</body>
</html>
