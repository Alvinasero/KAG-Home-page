<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KAG Admin | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; color: white; }
        .login-card { max-width: 400px; margin-top: 100px; border: none; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card login-card p-4 bg-white text-dark shadow-lg">
            <h3 class="text-center fw-bold">KAG Maridadi</h3>
            <p class="text-center text-muted">Authorized Personnel Only</p>
            <form id="loginForm">
                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" id="user" class="form-control" placeholder="admin" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" id="pass" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Unlock Dashboard</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;

            try {
                // Call the Backend Login API
                const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                    ? 'http://localhost:3000' : '';

                const res = await fetch(`${baseUrl}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    // Store the session "token" in the browser
                    localStorage.setItem('kag_admin_session', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    const error = await res.json();
                    alert("Access Denied: " + (error.message || "Incorrect credentials."));
                }
            } catch (err) {
                console.error("Connection error:", err);
                alert("Could not reach the backend. Is it running on port 3000?");
            }
        };
    </script>
</body>
</html>
