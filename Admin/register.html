<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAG Admin | Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top left, #1a1a2e, #0a0a12); 
            min-height: 100vh; 
        }
        .register-card { border: none; border-radius: 1.5rem; box-shadow: 0 1rem 3rem rgba(0,0,0,0.5); }
        .btn-success { background: #d4af37; border: none; font-weight: 600; padding: 12px; color: #0a192f; }
        .btn-success:hover { background: #f1c40f; color: #0a192f; }
        .form-control { border-radius: 0.75rem; padding: 0.6rem 1rem; }
    </style>
</head>
<body class="d-flex align-items-center py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-9 col-md-7 col-lg-5">
                <div class="card register-card p-4 bg-white text-dark">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold" style="color: #0a192f;">Create Admin Account</h3>
                        <p class="text-muted small">Register new authorized personnel</p>
                    </div>
                    <form id="registerForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" id="regName" class="form-control" placeholder="Full Name" required>
                            </div>
                            <div class="col-md-6">
                                <input type="text" id="regUser" class="form-control" placeholder="Username" required>
                            </div>
                        </div>
                        <div class="my-3">
                            <input type="password" id="regPass" class="form-control" placeholder="Password" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" id="regConfirm" class="form-control" placeholder="Confirm Password" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2">Create Account</button>
                        <div class="mt-4 text-center">
                            <p class="small mb-0">Already have an account? <a href="login.html" class="text-decoration-none fw-bold">Sign In</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const username = document.getElementById('regUser').value;
            const password = document.getElementById('regPass').value;
            const confirmPass = document.getElementById('regConfirm').value;

            if (password !== confirmPass) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                    ? 'http://localhost:3000' : '';

                const res = await fetch(`${baseUrl}/api/admin/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password })
                });

                const data = await res.json();
                if (res.ok) {
                    alert("Account created successfully! You can now log in.");
                    window.location.href = 'login.html';
                } else {
                    alert("Registration Failed: " + (data.message || "Unknown error"));
                }
            } catch (err) {
                console.error("Connection error:", err);
                alert("Could not reach the backend server.");
            }
        };
    </script>
</body>
</html>still overlapping
