<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAG Admin | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; color: white; }
        .register-card { max-width: 450px; margin-top: 50px; border: none; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card register-card p-4 bg-white text-dark shadow-lg">
            <h3 class="text-center fw-bold">Create Admin Account</h3>
            <p class="text-center text-muted">Register new authorized personnel</p>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="regName" class="form-control" placeholder="Enter full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="regUser" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="regPass" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="regConfirm" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Create Account</button>
                <div class="mt-3 text-center">
                    <p class="small mb-0">Already have an account? <a href="login.html" class="text-decoration-none">Sign In</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const username = document.getElementById('regUser').value;
            const password = document.getElementById('regPass').value;
            const confirmPass = document.getElementById('regConfirm').value;

            if (password !== confirmPass) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                    ? 'http://localhost:3000' : '';

                const res = await fetch(`${baseUrl}/api/admin/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password })
                });

                const data = await res.json();
                if (res.ok) {
                    alert("Account created successfully! You can now log in.");
                    window.location.href = 'login.html';
                } else {
                    alert("Registration Failed: " + (data.message || "Unknown error"));
                }
            } catch (err) {
                console.error("Connection error:", err);
                alert("Could not reach the backend server.");
            }
        };
    </script>
</body>
</html>
