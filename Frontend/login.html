<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KAG Maridadi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --gold: #d4af37;
            --gold-hover: #b8962e;
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            border: none;
            border-top: 5px solid var(--gold);
            border-radius: 10px;
        }
        .btn-gold {
            background-color: var(--gold);
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-gold:hover {
            background-color: var(--gold-hover);
            color: white;
            transform: translateY(-2px);
        }
        .text-maridadi-navy {
            color: var(--navy);
        }
    </style>
</head>
<body class="d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-maridadi-navy">KAG MARIDADI</h2>
                    <p class="text-muted">Portal Access</p>
                </div>
                
                <div class="card shadow-lg login-card">
                    <div class="card-body p-4">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label small fw-bold">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="name@kagmaridadi.org" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label small fw-bold">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-gold w-100 py-2">Sign In</button>
                            <div class="mt-3 text-center">
                                <a href="#" onclick="alert('Please contact the church office to reset your portal password.')" class="small text-decoration-none text-muted">Forgot Password?</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="small text-muted">Need an account? <a href="contact.html" class="text-gold text-decoration-none fw-bold">Contact Admin</a></p>
                    <a href="index.html" class="text-decoration-none text-muted small mt-2 d-block">← Back to Church Home</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if the user just logged out
        if (new URLSearchParams(window.location.search).get('logout') === 'success') {
            if (!confirm("Administrator has logged out successfully. Would you like to log in again?")) {
                window.location.href = 'index.html'; // Redirect to home if they cancel
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('email').value; // Backend expects username
            const password = document.getElementById('password').value;

            const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                ? 'http://localhost:3000' : '';

            try {
                const response = await fetch(`${baseUrl}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // 1. Save Token to Local Storage
                    localStorage.setItem('kag_token', result.token);
                    localStorage.setItem('kag_role', result.role);

                    // 2. Redirect based on role
                    if (result.role === 'Admin') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    // Show error message
                    alert(result.message || "Invalid Login Details");
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Connection to server failed. Ensure your Node.js backend is running.");
            }
        });

    </script>
</body>
</html>
