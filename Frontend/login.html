<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KAG Maridadi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body class="auth-shell">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-maridadi-navy">KAG MARIDADI</h2>
                    <p class="text-muted mb-0">Portal Access</p>
                </div>

                <div class="card login-card">
                    <div class="card-body p-4 p-md-5">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label small fw-bold">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="name@kagmaridadi.org" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label small fw-bold">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                            </div>
                            <button type="submit" class="btn btn-gold w-100">Sign In</button>
                            <div class="mt-3 text-center">
                                <a href="#" onclick="alert('Please contact the church office to reset your portal password.')" class="small text-decoration-none text-muted">Forgot Password?</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="small text-muted mb-2">Need an account? <a href="contact.html" class="text-gold text-decoration-none fw-bold">Contact Admin</a></p>
                    <a href="index.html" class="text-decoration-none text-muted small">Back to Church Home</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (new URLSearchParams(window.location.search).get('logout') === 'success') {
            if (!confirm('Administrator has logged out successfully. Would you like to log in again?')) {
                window.location.href = 'index.html';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? 'http://localhost:3000' : '';

            try {
                const response = await fetch(`${baseUrl}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('kag_token', result.token);
                    localStorage.setItem('kag_role', result.role);
                    window.location.href = result.role === 'Admin' ? 'dashboard.html' : 'index.html';
                } else {
                    alert(result.message || 'Invalid login details');
                }
            } catch (error) {
                alert('Connection to server failed. Ensure your Node.js backend is running.');
            }
        });
    </script>
</body>
</html>
