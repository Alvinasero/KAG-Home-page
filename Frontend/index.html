<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KAG Maridadi | Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h1 class="mb-4">Watch Latest Sermons</h1>
    <div id="sermonList" class="row"></div>

    <script>
        async function loadSermons() {
            try {
                const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                    ? 'http://localhost:3000' : '';

                // Fetch the list of sermons from the Backend
                const res = await fetch(`${baseUrl}/api/sermons`);
                const sermons = await res.json();
                const list = document.getElementById('sermonList');
                
                list.innerHTML = sermons.map(s => `
                    <div class="col-md-4 mb-3">
                        <div class="card p-3 shadow-sm">
                            <h5>${s.title}</h5>
                            <video width="100%" controls>
                                <source src="${baseUrl}${s.videoUrl}" type="video/mp4">
                            </video>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Failed to load sermons", err);
            }
        }
        loadSermons();
    </script>
</body>
</html>
