<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | KAG Maridadi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .success-card { max-width: 500px; text-align: center; padding: 40px; border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .check-icon { font-size: 80px; color: #d4af37; margin-bottom: 20px; animation: scaleUp 0.5s ease-out; }
        @keyframes scaleUp { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card success-card bg-white">
        <div class="card-body">
            <i class="fas fa-check-circle check-icon"></i>
            <h1 class="fw-bold mb-3" style="color: #0a192f;">God Bless You!</h1>
            <p class="text-muted mb-4">Your message has been received successfully. Our team will reach out to you shortly.</p>
            <a href="index.html" class="btn btn-dark px-4 py-2 rounded-pill">Back to Home</a>
        </div>
    </div>

</body>
</html>
