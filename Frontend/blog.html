<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | KAG Maridadi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy: #0a192f; --gold: #d4af37; }
        .blog-post-img { height: 200px; object-fit: cover; }
        .btn-gold { background: var(--gold); color: white; border: none; border-radius: 30px; }
        .text-navy { color: var(--navy); }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-navy sticky-top" style="background-color: var(--navy);">
        <div class="container">
            <a class="navbar-brand fw-bold text-gold" style="color: var(--gold);" href="index.html">KAG MARIDADI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="sermons.html">Sermons</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold text-navy mb-4">Latest Updates & News</h2>
        <div class="row" id="blogContainer">
            </div>
    </div>

    <footer class="py-4 bg-navy text-white text-center" style="background-color: var(--navy);">
        <div class="container">
            <div class="mb-2">
                <a href="index.html" class="text-white text-decoration-none mx-2 small">Home</a>
                <a href="sermons.html" class="text-white text-decoration-none mx-2 small">Sermons</a>
                <a href="events.html" class="text-white text-decoration-none mx-2 small">Events</a>
                <a href="contact.html" class="text-white text-decoration-none mx-2 small">Contact</a>
            </div>
            <p>&copy; 2026 KAG Maridadi Church. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        async function fetchBlog() {
            const container = document.getElementById('blogContainer');
            try {
                const res = await fetch('/api/blog');
                const posts = await res.json();
                container.innerHTML = '';

                posts.forEach(post => {
                    container.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card border-0 shadow-sm h-100">
                                <img src="/uploads/${post.image || 'default-blog.jpg'}" class="card-img-top blog-post-img" alt="News">
                                <div class="card-body">
                                    <span class="badge bg-light text-dark mb-2">${post.category}</span>
                                    <h5 class="fw-bold">${post.title}</h5>
                                    <p class="text-muted small">${post.content.substring(0, 120)}...</p>
                                    <a href="post-detail.html?id=${post.id}" class="btn btn-gold btn-sm">Read More</a>
                                </div>
                                <div class="card-footer bg-white border-0 text-muted small">
                                    Published: ${new Date(post.published_at).toLocaleDateString()}
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) { container.innerHTML = "No news available."; }
        }
        window.onload = fetchBlog;
    </script>
</body>
</html>
