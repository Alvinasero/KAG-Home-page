<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | KAG Maridadi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a192f; --gold: #d4af37; }
        .bg-navy { background-color: var(--navy); }
        .text-gold { color: var(--gold); }
        .event-card { border: none; border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .event-card:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .event-date-box { 
            background: var(--gold); 
            color: var(--navy); 
            padding: 10px; 
            text-align: center; 
            font-weight: bold; 
            min-width: 80px;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-navy">
        <div class="container">
            <a class="navbar-brand fw-bold text-gold" href="index.html">KAG MARIDADI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="sermons.html">Sermons</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="py-5 bg-navy text-white text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Church <span class="text-gold">Calendar</span></h1>
            <p>Don't miss out on what God is doing in our community.</p>
        </div>
    </header>

    <div class="container py-5">
        <div class="row" id="eventList">
            <div class="text-center py-5">
                <div class="spinner-border text-warning"></div>
            </div>
        </div>
    </div>

    <footer class="py-4 bg-navy text-white text-center">
        <div class="container">
            <div class="mb-2">
                <a href="index.html" class="text-white text-decoration-none mx-2 small">Home</a>
                <a href="sermons.html" class="text-white text-decoration-none mx-2 small">Sermons</a>
                <a href="events.html" class="text-white text-decoration-none mx-2 small">Events</a>
                <a href="contact.html" class="text-white text-decoration-none mx-2 small">Contact</a>
            </div>
            <p>&copy; 2026 KAG Maridadi Church. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        async function fetchEvents() {
            const container = document.getElementById('eventList');
            try {
                const res = await fetch('/api/events');
                const events = await res.json();
                container.innerHTML = '';

                events.forEach(event => {
                    const date = new Date(event.event_date);
                    container.innerHTML += `
                        <div class="col-12 mb-4">
                            <div class="card event-card shadow-sm d-flex flex-row">
                                <div class="event-date-box d-flex flex-column justify-content-center">
                                    <span class="fs-3">${date.getDate()}</span>
                                    <span class="small">${date.toLocaleString('default', { month: 'short' })}</span>
                                </div>
                                <div class="card-body">
                                    <h5 class="fw-bold text-navy">${event.title}</h5>
                                    <p class="text-muted mb-1"><i class="fas fa-clock me-2"></i>${event.event_time} | <i class="fas fa-map-marker-alt me-2"></i>${event.location}</p>
                                    <p class="small mb-0">${event.description}</p>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) { container.innerHTML = "No upcoming events found."; }
        }
        window.onload = fetchEvents;
    </script>
</body>
</html>
